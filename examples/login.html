<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>login</title>

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        kalam: ["Kalam", "Comic Sans MS", "cursive"],
      },
    },
  },
};
</script>

<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap');

.sketchy-page {
    transform: rotate(-0.3deg);
}

.sketchy-card {
    transform: rotate(0.2deg);
}

.sketchy-divider {
    transform: rotate(-0.1deg);
}

</style>
</head>
<body class="min-h-screen p-8 md:p-12 font-kalam bg-stone-100">
<div class="page mx-auto bg-stone-50 p-8 border-2 border-stone-300 shadow-lg max-w-[900px] sketchy-page">
<nav class="flex gap-6 pb-2 mb-4 border-b-2 border-stone-500 text-[0.95em]"><span class="hover:underline cursor-default text-stone-800">Logo</span></nav>
<hr class="my-3 border-0 border-t-[2px] border-stone-400 sketchy-divider">
<h2 class="text-[1.6em] font-bold my-3 tracking-tight text-stone-800">Login</h2>
<p class="my-1.5 text-[0.95em] text-stone-600">Email</p>
<div class="inline-block min-w-[200px] my-1.5 p-2.5 border-2 border-stone-500 rounded bg-neutral-50 text-stone-400 italic">________</div>
<p class="my-1.5 text-[0.95em] text-stone-600">Password</p>
<div class="inline-block min-w-[200px] my-1.5 p-2.5 border-2 border-stone-500 rounded bg-neutral-50 text-stone-400 italic">________</div>
<a href="dashboard.html" class="inline-block my-2 px-5 py-2 border-2 border-stone-700 rounded-md bg-stone-200 cursor-default shadow-sm active:shadow-none active:translate-x-px active:translate-y-0.5 text-stone-800 no-underline">Sign In</a>
<p class="my-1.5 text-[0.95em] text-stone-600">Forgot password?</p>
</div>

<script>
(function(){
  let last = 0;
  setInterval(async () => {
    try {
      const r = await fetch('/__wirecup_reload?t=' + Date.now());
      const j = await r.json();
      if (last && j.t !== last) location.reload();
      last = j.t;
    } catch(e) {}
  }, 400);
})();
</script>

</body>
</html>
