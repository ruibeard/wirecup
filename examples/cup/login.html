<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap');
:root {
  --bg_page: #f5f5f0;
  --bg_card: #fffef8;
  --bg_input: #fafafa;
  --bg_button: #eee;
  --bg_image: #e8e8e8;
  --bg_badge_green: #e6f4ea;
  --bg_badge_amber: #fef3e8;
  --bg_badge_red: #fce8e8;
  --bg_badge_blue: #e8f0fe;
  --bg_badge_grey: #f1f3f4;
  --bg_alert_green: #e6f4ea;
  --bg_alert_amber: #fef3e8;
  --bg_alert_red: #fce8e8;
  --bg_alert_blue: #e8f0fe;
  --bg_table_header: #f0f0e8;
  --bg_table_alt: #fafaf5;
  --text_primary: #333;
  --text_secondary: #555;
  --text_muted: #999;
  --text_placeholder: #bbb;
  --text_badge_green: #137333;
  --text_badge_amber: #b06000;
  --text_badge_red: #a50e0e;
  --text_badge_blue: #174ea6;
  --text_badge_grey: #5f6368;
  --text_alert_green: #137333;
  --text_alert_amber: #b06000;
  --text_alert_red: #a50e0e;
  --text_alert_blue: #174ea6;
  --border_page: #ccc;
  --border_light: #aaa;
  --border_medium: #888;
  --border_dark: #555;
  --border_card: #777;
  --border_image: #aaa;
  --border_badge_green: #34a853;
  --border_badge_amber: #f9ab00;
  --border_badge_red: #ea4335;
  --border_badge_blue: #4285f4;
  --border_badge_grey: #9aa0a6;
  --border_alert_green: #34a853;
  --border_alert_amber: #f9ab00;
  --border_alert_red: #ea4335;
  --border_alert_blue: #4285f4;
  --border_checkbox: #666;
  --shadow: rgba(0,0,0,0.1);
  --shadow_button: #bbb;
  --page_width: 900px;
  --page_padding: 30px;
  --card_padding: 14px;
  --card_margin: 10px 0;
  --card_radius: 6px;
  --button_padding: 8px 18px;
  --button_radius: 6px;
  --input_padding: 8px 10px;
  --input_radius: 4px;
  --image_min_height: 80px;
  --image_border: dashed;
  --alert_padding: 12px 16px;
  --alert_radius: 6px;
  --badge_padding: 3px 10px;
  --badge_radius: 12px;
  --table_padding: 8px 12px;
}
body { font-family: 'Kalam', Comic Sans MS, cursive, sans-serif; background: var(--bg_page); }
.sketchy-page { transform: rotate(-0.3deg); }
.sketchy-card { transform: rotate(0.2deg); }
.sketchy-card-alt { transform: rotate(-0.1deg); }
.sketchy-divider { transform: rotate(-0.1deg); }
</style>

</head>
<body class="min-h-screen p-8 md:p-12">
<div class="page mx-auto bg-[var(--bg-card)] p-[var(--page-padding)] border-2 border-[var(--border-page)] shadow-lg max-w-[var(--page-width)] sketchy-page">
<nav class="flex gap-6 pb-2 mb-4 border-b-2 border-[var(--border-medium)] text-[0.95em]"><span class="hover:underline cursor-default text-[var(--text-primary)]">Logo</span></nav>
<hr class="my-3 border-0 border-t-[2px] border-[var(--border-light)] sketchy-divider">
<h2 class="text-[1.6em] font-bold my-3 tracking-tight text-[var(--text-primary)]">Login</h2>
<p class="my-1.5 text-[0.95em] text-[var(--text-secondary)]">Email</p>
<div class="inline-block min-w-[200px] my-1.5 p-[var(--input-padding)] border-2 border-[var(--border-medium)] rounded-[var(--input-radius)] bg-[var(--bg-input)] text-[var(--text-placeholder)] italic">________</div>
<p class="my-1.5 text-[0.95em] text-[var(--text-secondary)]">Password</p>
<div class="inline-block min-w-[200px] my-1.5 p-[var(--input-padding)] border-2 border-[var(--border-medium)] rounded-[var(--input-radius)] bg-[var(--bg-input)] text-[var(--text-placeholder)] italic">________</div>
<a href="dashboard.html" class="inline-block my-2 px-[18px] py-[8px] border-2 border-[var(--border-dark)] rounded-[var(--button-radius)] bg-[var(--bg-button)] cursor-default shadow-[1px_2px_0_var(--shadow-button)] active:shadow-none active:translate-x-px active:translate-y-0.5 text-[var(--text-primary)] no-underline">Sign In</a>
<p class="my-1.5 text-[0.95em] text-[var(--text-secondary)]">Forgot password?</p>
</div>
</body>
</html>
