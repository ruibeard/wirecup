<!doctype html><html><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
* { box-sizing: border-box; }
body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #ffffff;
    padding: 40px;
    color: #212529;
}
.page {
    max-width: 900px;
    margin: 0 auto;
    background: #f8f9fa;
    padding: 40px;
    box-shadow: 2px 3px 10px rgba(0,0,0,0.05);
    border: 2px solid #dee2e6;
    transform: rotate(0deg);
}
.nav {
    display: flex; gap: 24px; padding: 8px 0;
    border-bottom: 2px solid #adb5bd; margin-bottom: 16px;
    font-size: 0.95em;
}
.nav span { cursor: default; }
.nav span:hover { text-decoration: underline; }
.heading {
    font-size: 1.6em; font-weight: 700; margin: 12px 0 8px;
    letter-spacing: -0.5px;
}
.text { margin: 6px 0; font-size: 0.95em; color: #495057; }
.input {
    border: 2px solid #adb5bd; border-radius: 6px;
    padding: 10px 12px; margin: 6px 0;
    background: #ffffff; color: #adb5bd;
    font-family: inherit; min-width: 200px; display: inline-block;
}
.button {
    border: 2px solid #495057; border-radius: 6px;
    padding: 10px 20px; margin: 8px 0;
    background: #007bff; cursor: default;
    font-family: inherit; display: inline-block;
    box-shadow: 1px 2px 0 rgba(0,123,255,0.3);
}
.button:active { box-shadow: none; transform: translate(1px, 2px); }
.select {
    border: 2px solid #adb5bd; border-radius: 6px;
    padding: 8px 28px 8px 10px; margin: 6px 0;
    background: #ffffff; display: inline-block; position: relative;
}
.select::after { content: '▾'; position: absolute; right: 8px; }
.image {
    background: #e9ecef; border: 2px solid #adb5bd;
    min-height: 100px; min-width: 80px; margin: 6px 0;
    display: flex; align-items: center; justify-content: center;
    color: #adb5bd; font-size: 0.8em;
}
.card {
    border: 2px solid #dee2e6; border-radius: 8px;
    padding: 20px; margin: 16px 0;
    background: #f8f9fa; transform: rotate(0deg);
}
.card:nth-child(even) { transform: rotate(0deg); }
.row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
.list { margin: 4px 0; padding-left: 18px; }
.list::marker { content: '• '; }
.divider {
    border: none; border-top: 2px solid #ced4da;
    margin: 12px 0; transform: rotate(0deg);
}
.thick { border-top-width: 3px; border-color: #dee2e6; }
.placeholder { color: #ced4da; font-style: italic; }

/* Extended elements */
.table-wrap { margin: 10px 0; overflow-x: auto; }
.table {
    width: 100%; border-collapse: collapse;
    font-size: 0.9em;
}
.table th, .table td {
    border: 2px solid #adb5bd; padding: 10px 14px;
    text-align: left;
}
.table th { background: #e9ecef; font-weight: 700; }
.table tr:nth-child(even) { background: #f8f9fa; }
.badge {
    display: inline-block; padding: 4px 12px; border-radius: 16px;
    font-size: 0.8em; font-weight: 700; border: 2px solid;
    margin: 2px 4px 2px 0;
}
.badge-green { background: #d4edda; border-color: #c3e6cb; color: #155724; }
.badge-amber { background: #fff3cd; border-color: #ffeeba; color: #856404; }
.badge-red { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
.badge-blue { background: #d1ecf1; border-color: #bee5eb; color: #0c5460; }
.badge-grey { background: #e2e3e5; border-color: #d6d8db; color: #383d41; }
.alert {
    padding: 14px 18px; border-radius: 8px; border: 2px solid;
    margin: 10px 0; font-size: 0.95em;
}
.alert-green { background: #d4edda; border-color: #c3e6cb; color: #155724; }
.alert-amber { background: #fff3cd; border-color: #ffeeba; color: #856404; }
.alert-red { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
.alert-blue { background: #d1ecf1; border-color: #bee5eb; color: #0c5460; }
.checkbox {
    display: flex; align-items: center; gap: 8px;
    margin: 6px 0; font-size: 0.95em;
}
.checkbox-box {
    width: 18px; height: 18px; border: 2px solid #adb5bd;
    border-radius: 3px; display: inline-block; flex-shrink: 0;
}
</style>
</head><body><div class="page">
<div class="nav"><span>Home</span><span>About</span><span>Contact</span></div>
<hr class="divider thick">
<div class="heading">Welcome Back</div>
<div class="text">Here's what's happening today</div>
<div class="row"><div class="card"><div class="image">img</div>
<div class="heading">Users</div>
<div class="text">1,204</div></div>
<div class="card"><div class="image">img</div>
<div class="heading">Revenue</div>
<div class="text">$42K</div></div>
<div class="card"><div class="image">img</div>
<div class="heading">Orders</div>
<div class="text">89</div></div></div>
<hr class="divider">
<li class="list">New order #1024 from Alice</li>
<li class="list">Bob signed up</li>
<li class="list">Server alert resolved</li>
</div></body></html>
