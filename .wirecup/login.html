<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>login</title>
<script>tailwind.config={theme:{extend:{fontFamily:{balsamiq:["Balsamiq Sans","Comic Sans MS","cursive"]}}}};</script>
<script src="https://cdn.tailwindcss.com"></script>
<style>@import url('https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap');

.sketchy-page {
    transform: rotate(-0.3deg);
}

.sketchy-card {
    transform: rotate(0.2deg);
}

.sketchy-divider {
    transform: rotate(-0.1deg);
}
</style>
</head>
<body class="min-h-screen p-8 md:p-12 font-balsamiq bg-stone-100">
<div class="page mx-auto bg-stone-50 p-8 border-2 border-stone-300 shadow-lg max-w-[900px] sketchy-page">
<nav class="flex gap-6 pb-2 mb-4 border-b-2 border-stone-500 text-[0.95em]"><span class="text-stone-800">Wirecup</span></nav>
<hr class="my-3 border-0 border-t-[3px] border-stone-500 sketchy-divider">
<h2 class="text-[1.6em] font-bold my-3 tracking-tight text-stone-800">Sign In</h2>
<p class="my-1.5 text-[0.95em] text-stone-600">Work email</p>
<div class="inline-block min-w-[200px] my-1.5 p-2.5 border-2 border-stone-500 rounded bg-neutral-50 text-stone-400 italic">name@company.com</div>
<p class="my-1.5 text-[0.95em] text-stone-600">Password</p>
<div class="inline-block min-w-[200px] my-1.5 p-2.5 border-2 border-stone-500 rounded bg-neutral-50 text-stone-400 italic">********</div>
<label class="flex items-center gap-2 my-1.5 text-[0.95em] text-stone-800"><span class="inline-block w-[18px] h-[18px] border-2 border-stone-600 rounded-[3px] shrink-0"></span><span>Keep me signed in</span></label>
<a href="/dashboard" class="inline-block my-2 px-5 py-2 border-2 border-stone-700 rounded-md bg-stone-200 cursor-default shadow-sm text-stone-800 no-underline">Sign In</a>
<p class="my-1.5 text-[0.95em] text-stone-600">Forgot your password?</p>
<p class="my-1.5 text-[0.95em] text-stone-600">Need an account? Contact your admin.</p>
</div>
</body>
</html>
